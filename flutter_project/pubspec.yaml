name: print_bridge_thermal
description: A new Flutter PDF Print Bridge for ESC/POS Bluetooth Thermal Printers.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Menghubungkan dan mengirim data byte ke printer Bluetooth
  flutter_blue_plus: ^1.31.10

  # Mendeteksi file PDF yang dibagikan via menu "Share" Android
  receive_sharing_intent: ^1.6.0

  # Merender halaman PDF menjadi gambar (PNG/JPEG) agar bisa di-print sebagai bitmap
  pdfx: ^2.6.0

  # Mengolah byte piksel gambar (meresize, thresholding, dither grayscale)
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
